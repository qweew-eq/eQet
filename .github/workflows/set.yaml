Name: Deploy Web and Desktop Apps
on:
  push:
    branches: [ main ]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Build and Deploy Web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler@latest pages deploy ./dist --project-name=eqet-eew --branch main --commit-dirty=true

  build-desktop:
    needs: deploy-web
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows-x64
            runner: windows-latest
            args: ""
          - os: windows-arm64
            runner: windows-latest
            args: "--target aarch64-pc-windows-msvc"
          - os: macos
            runner: macos-latest
            args: "--target universal-apple-darwin"
          - os: linux-x64
            runner: ubuntu-latest
            args: ""
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            args: ""

    steps:
      - uses: actions/checkout@v4

      # Install Linux System Dependencies updated for Tauri v2 requirements
      - name: Install Linux System Dependencies
        if: startsWith(matrix.platform.os, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            webkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            ninja-build \
            xdotool \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install Rust & Setup Cross-Compilation targets for Mac Universal and Windows ARM64
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            ${{ matrix.platform.os == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
            ${{ matrix.platform.os == 'windows-arm64' && 'aarch64-pc-windows-msvc' || '' }}

      - name: Build Web Assets for Tauri
        run: |
          npm install
          npm run build

      # Updated to official Tauri v2 Action with Secure Automated Signing
      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'eQet Release v__VERSION__'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }} --no-version-check
          
