name: Deploy Web and Desktop Apps

on:
  push:
    branches: [ main ]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build and Deploy Web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REAL_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: |
          node -e "const fs = require('fs'); const f = 'src/map/map.js'; fs.writeFileSync(f, fs.readFileSync(f, 'utf8').replace(/__MAPTILER_KEY__/g, process.env.REAL_KEY));"
          npm install
          npm run build
          npx wrangler@latest pages deploy ./dist --project-name=eqet-eew --branch main --commit-dirty=true

  build-desktop:
    needs: deploy-web
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows-x64
            runner: windows-latest
            target_triple: x86_64-pc-windows-msvc
            args: ""
          - os: windows-arm64
            runner: windows-latest
            target_triple: aarch64-pc-windows-msvc
            args: "--target aarch64-pc-windows-msvc"
          - os: macos
            runner: macos-latest
            target_triple: universal-apple-darwin
            args: "--target universal-apple-darwin"
          - os: linux-x64
            runner: ubuntu-latest
            target_triple: x86_64-unknown-linux-gnu
            args: ""
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            target_triple: aarch64-unknown-linux-gnu
            args: ""

    steps:
      - uses: actions/checkout@v4

      # Install FUSE + WebKit/GTK libs on Linux runners
      - name: Install Linux System Dependencies
        if: startsWith(matrix.platform.os, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libgtk-3-dev \
            webkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            ninja-build \
            xdotool \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS universal)
        if: matrix.platform.os == 'macos'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Add Rust target (Windows ARM)
        if: matrix.platform.os == 'windows-arm64'
        run: |
          rustup target add aarch64-pc-windows-msvc

      - name: Build Web Assets for Tauri
        env:
          REAL_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: |
          node -e "const fs = require('fs'); const f = 'src/map/map.js'; fs.writeFileSync(f, fs.readFileSync(f, 'utf8').replace(/__MAPTILER_KEY__/g, process.env.REAL_KEY));"
          npm install
          npm run build

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'eQet Release v__VERSION__'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }} --ignore-version-mismatches
